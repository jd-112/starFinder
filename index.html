<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Star Walk — Hollywood Walk of Fame</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #F5F3EE;
    --surface: #FFFFFF;
    --border: #E8E4DC;
    --text: #1A1814;
    --muted: #8A847A;
    --accent: #C8973A;
    --accent-light: #F5E9D0;
    --film: #2C5F8A;
    --tv: #7A3B8A;
    --music: #8A3B3B;
    --radio: #3B7A5A;
    --theatre: #5A6A3B;
    --live: #8A5A3B;
    --radius: 16px;
    --safe-bottom: env(safe-area-inset-bottom, 0px);
  }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    overflow-x: hidden;
  }

  /* APP SHELL */
  .app {
    max-width: 430px;
    margin: 0 auto;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    background: var(--bg);
  }

  /* HEADER */
  .header {
    padding: 56px 24px 20px;
    background: var(--bg);
    position: sticky;
    top: 0;
    z-index: 100;
    border-bottom: 1px solid transparent;
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  .header.scrolled {
    border-color: var(--border);
    box-shadow: 0 2px 20px rgba(0,0,0,0.04);
  }
  .header-top {
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    margin-bottom: 16px;
  }
  .logo {
    display: flex;
    flex-direction: column;
    gap: 2px;
  }
  .logo-eyebrow {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--accent);
  }
  .logo-title {
    font-family: 'DM Serif Display', serif;
    font-size: 28px;
    line-height: 1;
    color: var(--text);
  }
  .star-count-badge {
    background: var(--accent-light);
    color: var(--accent);
    font-size: 11px;
    font-weight: 600;
    padding: 5px 10px;
    border-radius: 100px;
    letter-spacing: 0.03em;
  }

  /* SEARCH */
  .search-wrap {
    position: relative;
  }
  .search-icon {
    position: absolute;
    left: 14px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--muted);
    pointer-events: none;
  }
  .search-input {
    width: 100%;
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: 12px;
    padding: 13px 14px 13px 42px;
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    color: var(--text);
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
    -webkit-appearance: none;
  }
  .search-input:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(200,151,58,0.12);
  }
  .search-input::placeholder { color: var(--muted); }
  .search-clear {
    position: absolute;
    right: 12px;
    top: 50%;
    transform: translateY(-50%);
    background: var(--border);
    border: none;
    border-radius: 50%;
    width: 20px;
    height: 20px;
    display: none;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    color: var(--muted);
    font-size: 12px;
    padding: 0;
  }
  .search-clear.visible { display: flex; }

  /* TABS - CATEGORIES */
  .tabs-wrap {
    padding: 16px 0 0;
    overflow-x: auto;
    scrollbar-width: none;
    -ms-overflow-style: none;
  }
  .tabs-wrap::-webkit-scrollbar { display: none; }
  .tabs {
    display: flex;
    gap: 8px;
    padding: 0 24px;
    width: max-content;
  }
  .tab {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 8px 14px;
    border-radius: 100px;
    border: 1.5px solid var(--border);
    background: var(--surface);
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 500;
    color: var(--muted);
    cursor: pointer;
    white-space: nowrap;
    transition: all 0.18s;
    -webkit-tap-highlight-color: transparent;
  }
  .tab:active { transform: scale(0.96); }
  .tab.active {
    background: var(--text);
    border-color: var(--text);
    color: #fff;
  }
  .tab-dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  /* MAIN CONTENT */
  .content {
    flex: 1;
    padding: 20px 24px;
    padding-bottom: calc(20px + var(--safe-bottom));
    overflow-y: auto;
  }

  /* SECTION LABEL */
  .section-label {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 12px;
  }

  /* RESULTS COUNT */
  .results-info {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 16px;
  }
  .results-count {
    font-size: 13px;
    color: var(--muted);
  }
  .results-count span { color: var(--text); font-weight: 600; }

  /* THUMBNAILS */
  .thumb {
    width: 44px;
    height: 44px;
    border-radius: 12px;
    object-fit: cover;
    flex-shrink: 0;
    display: block;
  }
  .thumb-placeholder {
    width: 52px;
    height: 62px;
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    font-size: 22px;
    transition: opacity 0.2s;
  }
  .thumb-wrap {
    position: relative;
    width: 52px;
    height: 62px;
    flex-shrink: 0;
    border-radius: 12px;
    overflow: hidden;
  }
  .thumb-wrap img {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    border-radius: 12px;
    object-fit: cover;
    object-position: center top;
    opacity: 0;
    transition: opacity 0.3s;
  }
  .thumb-wrap img.loaded { opacity: 1; }
  .thumb-wrap .thumb-placeholder {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    border-radius: 12px;
    transition: opacity 0.3s;
  }
  .thumb-wrap img.loaded + .thumb-placeholder,
  .thumb-wrap.has-image .thumb-placeholder { opacity: 0; pointer-events: none; }

  /* CAROUSEL */
  .carousel-wrap {
    margin: 0 -24px 20px;
    position: relative;
    background: #111;
    overflow: hidden;
  }
  .carousel-track {
    display: flex;
    transition: transform 0.38s cubic-bezier(0.4, 0, 0.2, 1);
    will-change: transform;
  }
  .carousel-slide {
    flex-shrink: 0;
    width: 100%;
    height: 240px;
    position: relative;
    overflow: hidden;
  }
  .carousel-slide img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: top center;
    opacity: 0;
    transition: opacity 0.4s;
  }
  .carousel-slide img.loaded { opacity: 1; }
  .carousel-skeleton {
    position: absolute;
    inset: 0;
    background: linear-gradient(90deg, #1e1e1e 25%, #2a2a2a 50%, #1e1e1e 75%);
    background-size: 200% 100%;
    animation: shimmer 1.5s infinite;
  }
  .carousel-skeleton.hidden { display: none; }

  /* Dots */
  .carousel-dots {
    position: absolute;
    bottom: 12px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 6px;
    z-index: 2;
  }
  .carousel-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: rgba(255,255,255,0.4);
    transition: all 0.2s;
    cursor: pointer;
  }
  .carousel-dot.active {
    background: #fff;
    width: 18px;
    border-radius: 3px;
  }

  /* Prev/Next arrows */
  .carousel-arrow {
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
    z-index: 2;
    background: rgba(255,255,255,0.15);
    backdrop-filter: blur(6px);
    border: none;
    border-radius: 50%;
    width: 34px;
    height: 34px;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #fff;
    cursor: pointer;
    opacity: 0;
    transition: opacity 0.2s;
    -webkit-tap-highlight-color: transparent;
  }
  .carousel-wrap:hover .carousel-arrow { opacity: 1; }
  .carousel-arrow.prev { left: 12px; }
  .carousel-arrow.next { right: 12px; }
  .carousel-arrow:active { transform: translateY(-50%) scale(0.93); }
  .carousel-arrow.hidden { display: none; }

  /* Fallback emoji block when no images */
  .carousel-fallback {
    height: 160px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 10px;
    background: var(--bg);
    margin: 0 -24px 20px;
  }
  .carousel-fallback-emoji { font-size: 48px; }
  .carousel-fallback-label { font-size: 12px; color: var(--muted); }

  .detail-icon-wrap { transition: opacity 0.2s; }
  .detail-icon-wrap.hidden { display: none; }

  /* LOAD MORE SENTINEL */
  .load-more-sentinel {
    height: 40px;
    display: flex;
    align-items: center;
    justify-content: center;
    margin-top: 8px;
  }
  .load-more-spinner {
    width: 20px;
    height: 20px;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    display: none;
  }
  .load-more-spinner.visible { display: block; }

  /* DATA LOADING BANNER */
  .data-loading-bar {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 16px;
    background: var(--accent-light);
    border-radius: 12px;
    margin-bottom: 16px;
    font-size: 13px;
    color: var(--accent);
    font-weight: 500;
  }
  .data-loading-bar.hidden { display: none; }
  .data-spinner {
    width: 14px;
    height: 14px;
    border: 2px solid var(--accent);
    border-top-color: transparent;
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    flex-shrink: 0;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* BIO SECTION */
  .bio-section {
    margin-bottom: 16px;
  }
  .bio-section-label {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 10px;
  }
  .bio-blurb {
    font-size: 14px;
    line-height: 1.7;
    color: var(--text);
    margin-bottom: 14px;
  }
  .bio-known-for {
    display: flex;
    flex-direction: column;
    gap: 7px;
  }
  .bio-fact {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    font-size: 13.5px;
    line-height: 1.5;
    color: var(--text);
  }
  .bio-fact-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--accent);
    flex-shrink: 0;
    margin-top: 7px;
  }
  .bio-loading {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .bio-skel-line {
    height: 13px;
    border-radius: 6px;
  }
  .bio-skel-line:nth-child(1) { width: 100%; }
  .bio-skel-line:nth-child(2) { width: 92%; }
  .bio-skel-line:nth-child(3) { width: 85%; }
  .bio-skel-line:nth-child(4) { width: 70%; margin-bottom: 6px; }
  .bio-skel-line:nth-child(5) { width: 60%; }
  .bio-skel-line:nth-child(6) { width: 65%; }
  .bio-skel-line:nth-child(7) { width: 55%; }
  .bio-error {
    font-size: 13px;
    color: var(--muted);
    font-style: italic;
  }

  /* STAR CARD */
  .star-list {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .star-card {
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: var(--radius);
    padding: 14px;
    display: flex;
    align-items: flex-start;
    gap: 14px;
    cursor: pointer;
    transition: border-color 0.18s, box-shadow 0.18s, transform 0.15s;
    -webkit-tap-highlight-color: transparent;
    text-decoration: none;
    color: inherit;
  }
  .star-card:active { transform: scale(0.98); }
  .star-card:hover { border-color: var(--accent); box-shadow: 0 4px 20px rgba(200,151,58,0.1); }

  .star-icon {
    width: 44px;
    height: 44px;
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    font-size: 20px;
  }
  .star-info { flex: 1; min-width: 0; }
  .star-name {
    font-family: 'DM Serif Display', serif;
    font-size: 17px;
    line-height: 1.2;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    margin-bottom: 4px;
  }
  .star-meta {
    display: flex;
    align-items: center;
    gap: 8px;
    flex-wrap: wrap;
  }
  .star-category-badge {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    padding: 3px 7px;
    border-radius: 6px;
    opacity: 0.85;
  }
  .star-known-for {
    font-size: 12px;
    color: var(--muted);
    line-height: 1.4;
    margin-bottom: 5px;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }
  .star-address {
    font-size: 12px;
    color: var(--muted);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .star-chevron { color: var(--border); flex-shrink: 0; }

  /* CATEGORY COLORS */
  .cat-film { background: #EBF2F8; color: var(--film); }
  .cat-film-icon { background: #EBF2F8; }
  .cat-tv { background: #F3EBF8; color: var(--tv); }
  .cat-tv-icon { background: #F3EBF8; }
  .cat-music { background: #F8EBEB; color: var(--music); }
  .cat-music-icon { background: #F8EBEB; }
  .cat-radio { background: #EBF5F1; color: var(--radio); }
  .cat-radio-icon { background: #EBF5F1; }
  .cat-theatre { background: #F1F3EB; color: var(--theatre); }
  .cat-theatre-icon { background: #F1F3EB; }
  .cat-live { background: #F5EFEB; color: var(--live); }
  .cat-live-icon { background: #F5EFEB; }

  /* EMPTY STATE */
  .empty-state {
    text-align: center;
    padding: 60px 20px;
    display: none;
  }
  .empty-state.visible { display: block; }
  .empty-star {
    font-size: 48px;
    margin-bottom: 16px;
    opacity: 0.3;
  }
  .empty-title {
    font-family: 'DM Serif Display', serif;
    font-size: 22px;
    margin-bottom: 8px;
    color: var(--text);
  }
  .empty-sub { font-size: 14px; color: var(--muted); line-height: 1.6; }

  /* DETAIL PANEL */
  .detail-overlay {
    position: fixed;
    inset: 0;
    background: rgba(26,24,20,0.4);
    z-index: 200;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.25s;
    backdrop-filter: blur(2px);
  }
  .detail-overlay.open { opacity: 1; pointer-events: all; }

  .detail-panel {
    position: fixed;
    bottom: 0;
    left: 50%;
    transform: translateX(-50%) translateY(100%);
    width: 100%;
    max-width: 430px;
    background: var(--surface);
    border-radius: 24px 24px 0 0;
    z-index: 201;
    transition: transform 0.32s cubic-bezier(0.34, 1.56, 0.64, 1);
    padding-bottom: var(--safe-bottom);
    max-height: 92vh;
    overflow-y: auto;
  }
  .detail-panel.open { transform: translateX(-50%) translateY(0); }

  .detail-handle {
    width: 36px;
    height: 4px;
    background: var(--border);
    border-radius: 4px;
    margin: 12px auto 0;
  }

  .detail-body { padding: 20px 24px 32px; }

  .detail-icon-wrap {
    width: 64px;
    height: 64px;
    border-radius: 18px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 30px;
    margin-bottom: 16px;
  }
  .detail-name {
    font-family: 'DM Serif Display', serif;
    font-size: 28px;
    line-height: 1.1;
    margin-bottom: 8px;
  }
  .detail-badges { display: flex; gap: 8px; margin-bottom: 20px; flex-wrap: wrap; }
  .detail-badge {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    padding: 5px 10px;
    border-radius: 8px;
  }

  .detail-info-rows { display: flex; flex-direction: column; gap: 10px; margin-bottom: 24px; }
  .detail-row {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    padding: 12px;
    background: var(--bg);
    border-radius: 12px;
  }
  .detail-row-icon { font-size: 16px; margin-top: 1px; }
  .detail-row-content {}
  .detail-row-label { font-size: 10px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; color: var(--muted); margin-bottom: 2px; }
  .detail-row-value { font-size: 14px; font-weight: 500; color: var(--text); line-height: 1.4; }

  .detail-actions { display: flex; flex-direction: column; gap: 10px; }
  .btn {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    padding: 15px;
    border-radius: 14px;
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    border: none;
    text-decoration: none;
    transition: opacity 0.15s, transform 0.15s;
    -webkit-tap-highlight-color: transparent;
  }
  .btn:active { transform: scale(0.97); opacity: 0.9; }
  .btn-primary { background: var(--text); color: #fff; }
  .btn-secondary { background: var(--bg); color: var(--text); border: 1.5px solid var(--border); }
  .btn-accent { background: var(--accent); color: #fff; }

  /* MAP SECTION */
  .map-section {
    border-radius: 14px;
    overflow: hidden;
    border: 1.5px solid var(--border);
    margin-bottom: 16px;
    background: #f0ede7;
    height: 160px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 8px;
    cursor: pointer;
    text-decoration: none;
    transition: opacity 0.15s;
  }
  .map-section:active { opacity: 0.8; }
  .map-placeholder {
    font-size: 28px;
  }
  .map-street {
    font-family: 'DM Serif Display', serif;
    font-size: 15px;
    color: var(--text);
  }
  .map-sub { font-size: 12px; color: var(--muted); }

  /* FEATURED / TOP ROW */
  .featured-row {
    display: flex;
    gap: 10px;
    overflow-x: auto;
    scrollbar-width: none;
    margin: 0 -24px;
    padding: 0 24px 4px;
    margin-bottom: 20px;
  }
  .featured-row::-webkit-scrollbar { display: none; }
  .featured-card {
    flex-shrink: 0;
    width: 130px;
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: var(--radius);
    padding: 14px;
    cursor: pointer;
    transition: border-color 0.18s;
    -webkit-tap-highlight-color: transparent;
  }
  .featured-card:active { transform: scale(0.97); }
  .featured-card:hover { border-color: var(--accent); }
  .featured-emoji { font-size: 24px; margin-bottom: 8px; }
  .featured-name {
    font-family: 'DM Serif Display', serif;
    font-size: 14px;
    line-height: 1.25;
    margin-bottom: 4px;
  }
  .featured-cat { font-size: 10px; font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase; color: var(--muted); }

  /* LOADING */
  @keyframes shimmer {
    0% { background-position: -200% 0; }
    100% { background-position: 200% 0; }
  }
  .skeleton {
    background: linear-gradient(90deg, var(--border) 25%, var(--bg) 50%, var(--border) 75%);
    background-size: 200% 100%;
    animation: shimmer 1.5s infinite;
    border-radius: 8px;
  }
</style>
</head>
<body>
<div class="app">

  <!-- HEADER -->
  <div class="header" id="header">
    <div class="header-top">
      <div class="logo">
        <span class="logo-eyebrow">Hollywood</span>
        <span class="logo-title">Star Walk</span>
      </div>
      <div class="star-count-badge" id="star-count-badge">2,700+ Stars</div>
    </div>
    <div class="search-wrap">
      <svg class="search-icon" width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.2">
        <circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/>
      </svg>
      <input class="search-input" id="search" type="search" placeholder="Search any celebrity…" autocomplete="off" autocorrect="off" spellcheck="false">
      <button class="search-clear" id="search-clear" aria-label="Clear search">✕</button>
    </div>
    <div class="tabs-wrap">
      <div class="tabs" id="tabs">
        <button class="tab active" data-cat="all">
          <span class="tab-dot" style="background:#C8973A"></span> All

  {name:"Wink Martindale",cat:"music",emoji:"\ud83c\udfb5",year:1994,address:"6231 Hollywood Blvd",lat:34.1016,lng:-118.3370,note:"Deck of Cards and TV host"},
  {name:"Woody Allen",cat:"film",emoji:"\ud83c\udfac",year:1996,address:"6065 Hollywood Blvd",lat:34.1016,lng:-118.3370,note:"Annie Hall and Manhattan writer-director"},
  {name:"Woody Guthrie",cat:"music",emoji:"\ud83c\udfb5",year:1988,address:"1731 Vine St",lat:34.1016,lng:-118.3370,note:"This Land Is Your Land and folk legend"},
  {name:"Yul Brynner",cat:"film",emoji:"\ud83c\udfac",year:1960,address:"6264 Hollywood Blvd",lat:34.1016,lng:-118.3370,note:"The King and I Oscar winner"},
  {name:"Yvonne De Carlo",cat:"film",emoji:"\ud83c\udfac",year:1984,address:"6264 Hollywood Blvd",lat:34.1016,lng:-118.3370,note:"The Munsters' Lily Munster"},
  {name:"Zero Mostel",cat:"film",emoji:"\ud83c\udfac",year:1960,address:"6264 Hollywood Blvd",lat:34.1016,lng:-118.3370,note:"Fiddler on the Roof and The Producers"},
  {name:"Zoe Saldana",cat:"film",emoji:"\ud83c\udfac",year:2023,address:"7080 Hollywood Blvd",lat:34.1016,lng:-118.3370,note:"Avatar and Guardians of the Galaxy"},
  {name:"Zsa Zsa Gabor",cat:"film",emoji:"\ud83c\udfac",year:1960,address:"6263 Hollywood Blvd",lat:34.1016,lng:-118.3370,note:"Moulin Rouge and celebrity personality"},
];

// ─── STATE ───────────────────────────────────────────────────────────────────
let query = '';
let activeCategory = 'all';
let selectedStar = null;

// ─── CONFIG ──────────────────────────────────────────────────────────────────
const catConfig = {
  film:    { label: 'Film',        class: 'cat-film',    iconClass: 'cat-film-icon' },
  tv:      { label: 'Television',  class: 'cat-tv',      iconClass: 'cat-tv-icon' },
  music:   { label: 'Music',       class: 'cat-music',   iconClass: 'cat-music-icon' },
  radio:   { label: 'Radio',       class: 'cat-radio',   iconClass: 'cat-radio-icon' },
  theatre: { label: 'Theatre',     class: 'cat-theatre', iconClass: 'cat-theatre-icon' },
  live:    { label: 'Live Perf.',  class: 'cat-live',    iconClass: 'cat-live-icon' },
};

// ─── UTILS ───────────────────────────────────────────────────────────────────
function getMapUrl(star) {
  return `https://maps.google.com/maps?q=${encodeURIComponent(star.name + ' Hollywood Walk of Fame star')}&ll=${star.lat},${star.lng}&z=19`;
}

function filteredStars() {
  return STARS.filter(s => {
    const matchCat = activeCategory === 'all' || s.cat === activeCategory;
    const matchQ = !query || s.name.toLowerCase().includes(query);
    return matchCat && matchQ;
  });
}

// ─── IMAGE CACHE ─────────────────────────────────────────────────────────────
const imgCache = {};

function fetchWikiImage(name, el) {
  if (imgCache[name]) {
    if (imgCache[name] !== 'loading') applyImage(name, imgCache[name]);
    return;
  }
  imgCache[name] = 'loading';
  const title = encodeURIComponent(name);
  const url = `https://en.wikipedia.org/w/api.php?action=query&titles=${title}&prop=pageimages&format=json&pithumbsize=120&origin=*`;
  fetch(url)
    .then(r => r.json())
    .then(data => {
      const pages = data.query?.pages || {};
      const page = Object.values(pages)[0];
      const src = page?.thumbnail?.source;
      if (src) {
        imgCache[name] = src;
        applyImage(name, src);
      } else {
        imgCache[name] = null;
      }
    })
    .catch(() => { imgCache[name] = null; });
}

function applyImage(name, src) {
  document.querySelectorAll(`.thumb-wrap[data-name="${CSS.escape(name)}"]`).forEach(wrap => {
    const img = wrap.querySelector('img');
    if (img) {
      img.src = src;
      img.onload = () => {
        img.classList.add('loaded');
        wrap.classList.add('has-image');
      };
    }
  });
}

function preloadVisible() {
  document.querySelectorAll('.thumb-wrap[data-name]').forEach(wrap => {
    const name = wrap.getAttribute('data-name');
    if (name && !imgCache[name]) fetchWikiImage(name, wrap);
  });
}

// ─── FEATURED ────────────────────────────────────────────────────────────────
const FEATURED_NAMES = [
  'Marilyn Monroe','Elvis Presley','Michael Jackson','Audrey Hepburn',
  'Frank Sinatra','Beyoncé','Leonardo DiCaprio','Taylor Swift',
  'Cary Grant','Madonna'
];

function renderFeatured() {
  const featured = FEATURED_NAMES.map(n => STARS.find(s => s.name === n)).filter(Boolean);
  const row = document.getElementById('featured-row');
  if (!row) return;
  row.innerHTML = featured.map(s => {
    const cc = catConfig[s.cat] || catConfig.film;
    const cached = imgCache[s.name];
    const imgSrc = (cached && cached !== 'loading') ? cached : '';
    return `<div class="featured-card" data-open="${encodeURIComponent(s.name)}">
      <div class="thumb-wrap${imgSrc ? ' has-image' : ''}" data-name="${s.name.replace(/"/g,'&quot;')}" style="width:40px;height:40px;margin-bottom:8px;border-radius:10px">
        <img src="${imgSrc}" alt="${s.name}" ${imgSrc ? 'class="loaded"' : ''}>
        <div class="thumb-placeholder ${cc.iconClass}" style="border-radius:10px;font-size:18px">${s.emoji}</div>
      </div>
      <div class="featured-name">${s.name}</div>
      <div class="featured-cat">${cc.label}</div>
    </div>`;
  }).join('');
  preloadVisible();
}

// ─── PAGINATION ──────────────────────────────────────────────────────────────
const PAGE_SIZE = 50;
let currentPage = 0;
let currentFiltered = [];
let sentinelObserver = null;

function buildCard(s) {
  const cc = catConfig[s.cat] || catConfig.film;
  const cached = imgCache[s.name];
  const imgSrc = (cached && cached !== 'loading') ? cached : '';
  return `<div class="star-card" data-open="${encodeURIComponent(s.name)}">
    <div class="thumb-wrap${imgSrc ? ' has-image' : ''}" data-name="${s.name.replace(/"/g,'&quot;')}">
      <img src="${imgSrc}" alt="${s.name}" ${imgSrc ? 'class="loaded"' : ''}>
      <div class="thumb-placeholder ${cc.iconClass}">${s.emoji}</div>
    </div>
    <div class="star-info">
      <div class="star-name">${s.name}</div>
      <div class="star-known-for">${s.note}</div>
      <div class="star-meta">
        <span class="star-category-badge ${cc.class}">${cc.label}</span>
        <span class="star-address">📍 ${s.address}</span>
      </div>
    </div>
    <svg class="star-chevron" width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path d="M9 18l6-6-6-6"/></svg>
  </div>`;
}

function appendPage() {
  const list = document.getElementById('star-list');
  const spinner = document.getElementById('load-more-spinner');
  const start = currentPage * PAGE_SIZE;
  const slice = currentFiltered.slice(start, start + PAGE_SIZE);
  if (!slice.length) {
    if (spinner) spinner.classList.remove('visible');
    return;
  }
  const wrapper = document.createElement('div');
  wrapper.innerHTML = slice.map(buildCard).join('');
  while (wrapper.firstChild) list.appendChild(wrapper.firstChild);
  currentPage++;
  preloadVisible();
  if (spinner) spinner.classList.toggle('visible', currentPage * PAGE_SIZE < currentFiltered.length);
}

function setupSentinelObserver() {
  if (sentinelObserver) sentinelObserver.disconnect();
  const sentinel = document.getElementById('load-more-sentinel');
  if (!sentinel) return;
  sentinelObserver = new IntersectionObserver(entries => {
    if (entries[0].isIntersecting) appendPage();
  }, { rootMargin: '200px' });
  sentinelObserver.observe(sentinel);
}

function renderList() {
  const stars = filteredStars();
  const list = document.getElementById('star-list');
  const empty = document.getElementById('empty-state');
  const count = document.getElementById('results-count');
  const label = document.getElementById('results-label');
  const featuredSection = document.getElementById('featured-section');
  const spinner = document.getElementById('load-more-spinner');

  featuredSection.style.display = (query || activeCategory !== 'all') ? 'none' : 'block';
  label.textContent = activeCategory === 'all' ? 'All Stars' : (catConfig[activeCategory]?.label || '') + ' Stars';
  count.innerHTML = `<span>${stars.length.toLocaleString()}</span> star${stars.length !== 1 ? 's' : ''}`;

  currentFiltered = stars;
  currentPage = 0;
  list.innerHTML = '';

  if (stars.length === 0) {
    empty.classList.add('visible');
    if (spinner) spinner.classList.remove('visible');
    return;
  }
  empty.classList.remove('visible');
  appendPage();
  setupSentinelObserver();
}

// ─── DETAIL PANEL ────────────────────────────────────────────────────────────
function openDetail(name) {
  const s = STARS.find(x => x.name === name);
  if (!s) return;
  selectedStar = s;
  const cc = catConfig[s.cat] || catConfig.film;
  const cached = imgCache[s.name];
  const imgSrc = (cached && cached !== 'loading') ? cached : '';
  const mapUrl = getMapUrl(s);

  document.getElementById('detail-body').innerHTML = `
    <div class="detail-hero">
      <div class="detail-thumb-wrap${imgSrc ? ' has-image' : ''}" data-name="${s.name.replace(/"/g,'&quot;')}">
        <img src="${imgSrc}" alt="${s.name}" ${imgSrc ? 'class="loaded"' : ''}>
        <div class="detail-thumb-placeholder ${cc.iconClass}"></div>
      </div>
      <div class="detail-hero-info">
        <div class="detail-name">${s.name}</div>
        <span class="star-category-badge ${cc.class}">${cc.label}</span>
      </div>
    </div>
    <div class="detail-section">
      <div class="detail-label">Known For</div>
      <div class="detail-value">${s.note}</div>
    </div>
    <div class="detail-section">
      <div class="detail-label">Inducted</div>
      <div class="detail-value">${s.year || '—'}</div>
    </div>
    <div class="detail-section">
      <div class="detail-label">Address</div>
      <div class="detail-value">${s.address}, Hollywood, CA</div>
    </div>
    <a class="detail-map-btn" href="${mapUrl}" target="_blank" rel="noopener">
      <svg width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z"/></svg>
      View on Google Maps
    </a>
  `;

  // Trigger image load for detail view if not cached
  if (!imgSrc) fetchWikiImage(s.name, document.querySelector('.detail-thumb-wrap'));

  document.getElementById('detail-overlay').classList.add('visible');
  document.getElementById('detail-panel').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeDetail() {
  document.getElementById('detail-overlay').classList.remove('visible');
  document.getElementById('detail-panel').classList.remove('open');
  document.body.style.overflow = '';
  selectedStar = null;
}

document.getElementById('detail-overlay').addEventListener('click', closeDetail);

// Delegated clicks — handles names with apostrophes/special chars safely
document.getElementById('featured-row').addEventListener('click', e => {
  const card = e.target.closest('[data-open]');
  if (card) openDetail(decodeURIComponent(card.dataset.open));
});
document.getElementById('star-list').addEventListener('click', e => {
  const card = e.target.closest('[data-open]');
  if (card) openDetail(decodeURIComponent(card.dataset.open));
});

// ─── SEARCH ──────────────────────────────────────────────────────────────────
document.getElementById('search').addEventListener('input', e => {
  query = e.target.value.toLowerCase().trim();
  renderList();
});

// ─── TABS ────────────────────────────────────────────────────────────────────
document.getElementById('tabs').addEventListener('click', e => {
  const tab = e.target.closest('[data-cat]');
  if (!tab) return;
  activeCategory = tab.dataset.cat;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  tab.classList.add('active');
  renderList();
});

// ─── SCROLL SHADOW ───────────────────────────────────────────────────────────
document.getElementById('content').addEventListener('scroll', e => {
  document.getElementById('header').classList.toggle('scrolled', e.target.scrollTop > 4);
});

// ─── SWIPE TO CLOSE ──────────────────────────────────────────────────────────
let touchStartY = 0;
document.getElementById('detail-panel').addEventListener('touchstart', e => {
  touchStartY = e.touches[0].clientY;
}, { passive: true });
document.getElementById('detail-panel').addEventListener('touchend', e => {
  const dy = e.changedTouches[0].clientY - touchStartY;
  if (dy > 80) closeDetail();
}, { passive: true });

// ─── INIT ────────────────────────────────────────────────────────────────────
function init() {
  document.getElementById('star-count-badge').textContent = `${STARS.length.toLocaleString()} Stars`;
  document.getElementById('data-loading-bar').classList.add('hidden');
  renderFeatured();
  renderList();
}

init();
</script>
</body>
